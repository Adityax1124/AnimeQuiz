<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Anime Guesser</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            background:
                linear-gradient(rgba(8,10,18,0.82), rgba(8,10,18,0.82)),
                url('main.jpg');
            background-size:cover;
            background-position:center;
            color:#fff;
        }

        .auth-card{
            width:100%;
            max-width:430px;
            background:rgba(10,16,28,0.88);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:24px;
            padding:28px 22px;
            box-shadow:0 18px 40px rgba(0,0,0,0.30);
            backdrop-filter:blur(8px);
        }

        .auth-card h1{
            font-size:2rem;
            margin-bottom:8px;
            text-align:center;
        }

        .auth-card p{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:22px;
        }

        .field{
            margin-bottom:16px;
        }

        .field label{
            display:block;
            margin-bottom:8px;
            font-weight:800;
            color:#e2e8f0;
        }

        .field input{
            width:100%;
            padding:14px 14px;
            border-radius:14px;
            border:1px solid rgba(255,255,255,0.10);
            background:rgba(255,255,255,0.06);
            color:#fff;
            outline:none;
            font-size:1rem;
        }

        .field input::placeholder{
            color:#94a3b8;
        }

        .auth-btn{
            width:100%;
            border:none;
            padding:14px 16px;
            border-radius:14px;
            cursor:pointer;
            font-size:1rem;
            font-weight:900;
            color:#fff;
            background:linear-gradient(90deg, #2563eb, #1d4ed8);
            margin-top:8px;
        }

        .auth-switch{
            margin-top:18px;
            text-align:center;
            color:#cbd5e1;
        }

        .auth-switch a{
            color:#60a5fa;
            text-decoration:none;
            font-weight:800;
        }

        .auth-message{
            margin-top:16px;
            text-align:center;
            font-weight:700;
            min-height:24px;
        }

        .success{
            color:#4ade80;
        }

        .error{
            color:#f87171;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Create Account</h1>
        <p>Sign up to save wins and appear on the leaderboard.</p>

        <form id="signupForm">
            <div class="field">
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" placeholder="Enter username" required>
            </div>

            <div class="field">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="Enter email" required>
            </div>

            <div class="field">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Enter password" required>
            </div>

            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div id="signupMessage" class="auth-message"></div>

        <div class="auth-switch">
            Already have an account?
            <a href="login.html">Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
</body>
</html>
